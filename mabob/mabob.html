<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body style="font-family: Verdana;">
    
    <label for="box1">box1:</label>
    <input type="text" id="box1" name="box1">
    <br>
    <label for="box2">box2:</label>
    <input type="text" id="box2" name="box2">
    <br>
    <label for="box3">box3:</label>
    <input readonly type="text" id="box3" name="box3">


</body>

<script>

    function testFunc() {
        let z = `${document.getElementById("box1").value} ${document.getElementById("box2").value}`
        document.getElementById("box3").value = z;
    }


    const myInput = document.querySelector('input');
    myInput.addEventListener('input', (event) => {
        testFunc();
    });


</script>
