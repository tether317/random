<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>examination random</title>
</head>
<body style="font-family: verdana;">

    <button onclick="thefunc()">this is a button</button>
    <p id="theresultp">Result: N/A</p>
    
</body>

<script>

    const lodos = ["[0-0] based"
                    ,"[1-1] lame"
                    ,"[1-2] 870"
                    ,"[1-3] doc"
                    ,"[1-4] tl"
                    ,"[2-1] rambo"
                    ,"[2-2] kicka"
                    ,"[2-3] doc+"
                    ,"[2-4] ser"
    ];

    function thefunc(){
        let rn = Math.floor(Math.random() * 9);
        let cc = lodos[rn]
        document.getElementById("theresultp").innerHTML = `Result: ${cc}`;
    }

</script>

</html>
